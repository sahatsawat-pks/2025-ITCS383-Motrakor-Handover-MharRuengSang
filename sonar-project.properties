sonar.projectKey=motrakar_motrakor
sonar.organization=motrakar


# This is the name and version displayed in the SonarCloud UI.
#sonar.projectName=motrakor
#sonar.projectVersion=1.0


# Path is relative to the sonar-project.properties file. Replace "\" by "/" on Windows.
sonar.sources=Implementations

# Encoding of the source code. Default is default system encoding
sonar.sourceEncoding=UTF-8

# JavaScript / TypeScript coverage report path (Jest --coverage outputs lcov.info)
sonar.javascript.lcov.reportPaths=Implementations/steamjek-backend/coverage/lcov.info

# Exclusions - test helpers, config scripts, seed/migration scripts, build artifacts
sonar.coverage.exclusions=\
  Implementations/steamjek-backend/tests/**,\
  Implementations/steamjek-backend/coverage/**,\
  Implementations/steamjek-backend/node_modules/**,\
  Implementations/steamjek-frontend/node_modules/**,\
  Implementations/steamjek-backend/db_seed.js,\
  Implementations/steamjek-backend/migrate.js,\
  Implementations/steamjek-backend/seed.js,\
  Implementations/steamjek-backend/test-server.js,\
  Implementations/steamjek-backend/tests/smoke-test.js,\
  Implementations/steamjek-backend/tests/test-stripe-purchase.js,\
  Implementations/steamjek-backend/sidebar_injector.js,\
  Implementations/steamjek-frontend/api.js,\
  Implementations/steamjek-frontend/main.js

# Duplicate detection exclusions
sonar.cpd.exclusions=\
  Implementations/steamjek-backend/tests/*.test.js,\
  Implementations/steamjek-frontend/*.html