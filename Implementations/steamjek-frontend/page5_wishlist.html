    .wish-genre {

    }

    }

      display: flex;
      flex-direction: column;

      flex-shrink: 0;

    }

<body>
  <div class="layout">
    <nav class="sidebar">
      <div class="logo">
        <div class="logo-mark">SJ</div>
        <div class="logo-text">Steam<em>Jek</em></div>
      </div>
      <div class="nav-section">Discover</div>
      <a class="nav-link" href="page1_store.html"><span class="nav-icon">🏪</span>Store</a>
      <a class="nav-link active" href="page5_wishlist.html"><span class="nav-icon">❤️</span>Wishlist<span
          class="nav-badge" id="wish-count">0</span></a>
      <a class="nav-link" href="page9_community.html"><span class="nav-icon">🌐</span>Community</a>
      <div class="nav-section">Library</div>
      <a class="nav-link" href="page6_library.html"><span class="nav-icon">🎮</span>My Games</a>
      <div class="nav-section">Market</div>
      <a class="nav-link" href="page4_marketplace.html"><span class="nav-icon">⚔️</span>Item Market</a>
      <div class="nav-section">Account</div>
      <a class="nav-link" href="page8_point_shop.html"><span class="nav-icon">⭐</span>Point Shop</a>
      <a class="nav-link" href="page7_profile.html"><span class="nav-icon">👤</span>Profile</a>
      <a class="nav-link" href="page3_cart.html"><span class="nav-icon">🛒</span>Cart<span
          class="nav-badge" id="cart-badge">0</span></a>
      <div class="sidebar-foot" id="user-context"></div>
    </nav>
    <div class="main">
      <div class="topbar">
        <div class="tb-title">❤️ Wishlist</div>
        <div class="tb-right">
          <button class="btn btn-ghost btn-sm" onclick="addAll()">🛒 Add All to Cart</button>
          <div class="cart-wrap"><a href="page3_cart.html" class="btn btn-primary btn-sm">🛒 <span class="cart-dot"
                style="position:static;display:inline-flex;margin-left:2px" id="cart-count">0</span></a></div>
        </div>
      </div>
      <div class="content">
        <div class="pg-hdr">
          <div>
            <div class="pg-title">My <em>Wishlist</em></div>
            <div class="pg-sub" id="pg-sub">Loading wishlist...</div>
          </div>
          <a href="page1_store.html" class="btn btn-ghost btn-sm">Browse Store →</a>
        </div>

        <!-- SUMMARY -->
        <div class="summary-bar">
          <div class="sb-stat">
            <div class="sb-val" id="sb-count">0</div>
            <div class="sb-label">Games</div>
          </div>
          <div class="sb-divider"></div>
          <div class="sb-stat">
            <div class="sb-val" id="sb-total" style="color:var(--gold)">$0.00</div>
            <div class="sb-label">Total Value</div>
          </div>
          <div class="sb-divider"></div>
          <div class="sb-stat">
            <div class="sb-val" style="color:var(--green)">1</div>
            <div class="sb-label">On Sale</div>
          </div>
        </div>

        <div id="wish-list"></div>
      </div>
    </div>
  </div>
  <div class="toasts" id="toasts"></div>

  <script src="api.js"></script>
  <script>
    let wishlist = [];

    function stars(r) { return [1, 2, 3, 4, 5].map(i => `<span class="star${i > r ? ' e' : ''}">★</span>`).join('') }
    
    function row(g) {
      const emoji = g.cover_image || "🎮";
      const rating = 4.5;
      const dev = "Developer";
      const priceFmt = Number(g.price) === 0 ? 'FREE' : '$' + Number(g.price).toFixed(2);
      
      return `
<div class="wish-row" id="wr-${g.game_id}">
  <div class="wish-thumb">${emoji}</div>
  <div class="wish-body">
    <div class="wish-genre">${g.genre || 'UNSPECIFIED'}</div>
    <div class="wish-title">${g.title}</div>
    <div class="wish-dev">by ${dev}</div>
    <div class="wish-tags">
      <span class="wtag wtag-age-ok">All Ages</span>
      <div class="stars">${stars(Math.round(rating))}<span class="rv">${rating}</span></div>
    </div>
  </div>
  <div class="wish-actions">
    <div class="wish-price ${Number(g.price) === 0 ? 'free' : ''}">${priceFmt}</div>
    <div class="wish-act-row">
      <button class="btn btn-primary btn-sm" onclick="addCart(${g.game_id})">🛒 Add to Cart</button>
      <button class="btn btn-red btn-sm" onclick="removeWish(${g.game_id})" title="Remove from wishlist">✕</button>
    </div>
  </div>
</div>`
    }

    function render() {
      const list = document.getElementById('wish-list');
      if (!wishlist || wishlist.length === 0) {
        list.innerHTML = `<div class="empty-state"><div class="empty-icon">❤️</div><div class="empty-title">Your wishlist is empty</div><div class="empty-sub">Browse the store and save games you want to play later</div><a href="page1_store.html" class="btn btn-primary">Browse Store →</a></div>`;
        document.getElementById('pg-sub').textContent = `Your wishlist is currently empty`;
        document.getElementById('sb-count').textContent = '0';
        document.getElementById('sb-total').textContent = '$0.00';
        if (document.getElementById('nb')) document.getElementById('nb').textContent = '0';
        return;
      }

      list.innerHTML = wishlist.map(row).join('');
      
      const total = wishlist.reduce((s, g) => s + Number(g.price || 0), 0);
      document.getElementById('pg-sub').textContent = `${wishlist.length} game${wishlist.length !== 1 ? 's' : ''} saved for later`;
      document.getElementById('sb-count').textContent = wishlist.length;
      document.getElementById('sb-total').textContent = '$' + total.toFixed(2);
      if (document.getElementById('nb')) document.getElementById('nb').textContent = wishlist.length;
    }

    async function initPage() {
      if (!Auth.isAuthenticated()) {
        const list = document.getElementById('wish-list');
        list.innerHTML = `<div class="empty-state"><div class="empty-icon">🔒</div><div class="empty-title">Login Required</div><div class="empty-sub">Please log in to view your wishlist</div><a href="page1_store.html" class="btn btn-primary">Go to Login →</a></div>`;
        return;
      }
      try {
        const data = await apiFetch('/wishlist');
        wishlist = data;
        render();
      } catch (err) {
        showToast(err.message || 'Failed to load wishlist', 'e');
      }
    }

    async function addCart(id) {
      if (!Auth.isAuthenticated()) { showToast('Please login', 'e'); return; }
      try {
        await apiFetch('/cart', {
          method: 'POST',
          body: JSON.stringify({ game_id: id })
        });
        showToast('Added to cart 🛒', 's');
      } catch (err) {
        showToast(err.message, 'e');
      }
    }

    async function removeWish(id) {
      if (!Auth.isAuthenticated()) return;
      try {
        await apiFetch(`/wishlist/${id}`, { method: 'DELETE' });
        showToast('Removed from wishlist', 'r');
        await initPage(); // reload
      } catch (err) {
        showToast(err.message, 'e');
      }
    }

    async function addAll() {
      if (!wishlist.length) { showToast('Wishlist is empty', 'i'); return }
      try {
        for (const item of wishlist) {
          await apiFetch('/cart', {
            method: 'POST',
            body: JSON.stringify({ game_id: item.game_id })
          }).catch(e => {
            if(e.message && e.message.includes('already')) return;
            throw e;
          });
        }
        showToast(`Added ${wishlist.length} games to cart 🛒`, 's');
      } catch(err) {
        showToast(err.message, 'e');
      }
    }

    document.addEventListener('DOMContentLoaded', initPage);
  </script>
</body>
