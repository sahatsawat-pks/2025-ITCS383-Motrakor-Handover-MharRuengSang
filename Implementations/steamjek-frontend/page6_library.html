<head>

  <link
    href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Exo+2:ital,wght@0,300;0,400;0,500;0,600;1,300&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="shared.css">
  <style>
    

    

    

    

    

    

    

    

    

    

    

    

    

    

    

    

    

    

    

    

    

    

    

    

    

    

    

    

    

    

    

    

    

    

    

    /* STATS */
    .lib-stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 28px
    }

    .ls-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px 20px
    }

    .ls-val {
      font-family: var(--fw);
      font-size: 28px;
      font-weight: 700
    }

    .ls-label {
      font-size: 12px;
      color: var(--muted);
      margin-top: 3px
    }

    /* SEARCH + FILTER ROW */
    .lib-controls {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-bottom: 22px;
      flex-wrap: wrap
    }

    .lib-search {
      flex: 1;
      max-width: 320px;
      position: relative
    }

    .lib-search input {
      width: 100%;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 14px 9px 38px;
      color: var(--text);
      font-family: var(--fb);
      font-size: 13px;
      outline: none;
      transition: border-color .2s
    }

    .lib-search input:focus {
      border-color: var(--accent)
    }

    .lib-search input::placeholder {
      color: var(--muted)
    }

    .lib-search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 13px
    }

    

    

    

    .view-btns {
      display: flex;
      gap: 6px;
      margin-left: auto
    }

    .view-btn {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 7px;
      background: var(--panel);
      border: 1px solid var(--border);
      cursor: pointer;
      font-size: 14px;
      color: var(--muted2);
      transition: all .2s
    }

    .view-btn.on {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(0, 212, 255, .08)
    }

    /* GAME CARD (GRID) */
    .lib-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px
    }

    .lg-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 13px;
      overflow: hidden;
      cursor: pointer;
      transition: all .25s
    }

    .lg-card:hover {
      border-color: rgba(0, 212, 255, .3);
      transform: translateY(-3px);
      box-shadow: 0 8px 32px rgba(0, 212, 255, .07)
    }

    .lg-thumb {
      height: 130px;
      background: var(--panel2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 50px;
      position: relative;
      overflow: hidden
    }

    .lg-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, transparent 50%, rgba(19, 27, 46, .95) 100%)
    }

    .lg-

    .lg-genre {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 4px
    }

    .lg-title {
      font-family: var(--fw);
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 6px
    }

    .lg-footer {
      display: flex;
      align-items: center;
      justify-content: space-between
    }

    .lg-hours {
      font-size: 11px;
      color: var(--muted2);
      font-family: var(--fm)
    }

    .cloud-badge {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      font-weight: 600
    }

    .cloud-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%
    }

    .cloud-dot.local {
      background: var(--accent)
    }

    .cloud-dot.cloud {
      background: var(--green)
    }

    .lg-actions {
      display: flex;
      gap: 6px;
      margin-top: 12px
    }

    .lg-actions 

    /* GAME ROW (LIST) */
    .lib-list {
      display: flex;
      flex-direction: column;
      gap: 10px
    }

    .ll-row {
      display: flex;
      align-items: center;
      gap: 16px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 18px;
      cursor: pointer;
      transition: all .25s
    }

    .ll-row:hover {
      border-color: rgba(0, 212, 255, .3)
    }

    .ll-thumb {
      width: 64px;
      height: 50px;
      background: var(--panel2);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      flex-shrink: 0;
      border: 1px solid var(--border)
    }

    .ll-info {
      flex: 1;
      min-width: 0
    }

    .ll-title {
      font-family: var(--fw);
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 2px
    }

    .ll-dev {
      font-size: 12px;
      color: var(--muted)
    }

    .ll-meta {
      display: flex;
      gap: 10px;
      margin-top: 6px;
      align-items: center
    }

    .ll-tag {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--accent)
    }

    .ll-hours {
      font-size: 11px;
      color: var(--muted2);
      font-family: var(--fm)
    }

    .ll-right {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0
    }

    .ll-actions {
      display: flex;
      gap: 8px
    }

        opacity: 1;
        transform: translateX(0)
      }
    }

    

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

</head>

<body>
  <div class="layout">
    <nav class="sidebar">
      <div class="logo">
        <div class="logo-mark">SJ</div>
        <div class="logo-text">Steam<em>Jek</em></div>
      </div>
      <div class="nav-section">Discover</div>
      <a class="nav-link" href="page1_store.html"><span class="nav-icon">🏪</span>Store</a>
      <a class="nav-link" href="page5_wishlist.html"><span class="nav-icon">❤️</span>Wishlist<span
          class="nav-badge" id="wish-count">0</span></a>
      <a class="nav-link" href="page9_community.html"><span class="nav-icon">🌐</span>Community</a>
      <div class="nav-section">Library</div>
      <a class="nav-link active" href="page6_library.html"><span class="nav-icon">🎮</span>My Games</a>
      <div class="nav-section">Market</div>
      <a class="nav-link" href="page4_marketplace.html"><span class="nav-icon">⚔️</span>Item Market</a>
      <div class="nav-section">Account</div>
      <a class="nav-link" href="page8_point_shop.html"><span class="nav-icon">⭐</span>Point Shop</a>
      <a class="nav-link" href="page7_profile.html"><span class="nav-icon">👤</span>Profile</a>
      <a class="nav-link" href="page3_cart.html"><span class="nav-icon">🛒</span>Cart<span
          class="nav-badge" id="cart-badge">0</span></a>
      <div class="sidebar-foot" id="user-context"></div>
    </nav>
    <div class="main">
      <div class="topbar">
        <div class="tb-title">🎮 My Library</div>
        <div class="tb-right">
          <a href="page1_store.html" class="btn btn-primary btn-sm">+ Get More Games</a>
        </div>
      </div>
      <div class="content">
        <!-- STATS -->
        <div class="lib-stats">
          <div class="ls-card">
            <div class="ls-val" style="color:var(--accent)">24</div>
            <div class="ls-label">Games Owned</div>
          </div>
          <div class="ls-card">
            <div class="ls-val" style="color:var(--gold)">847h</div>
            <div class="ls-label">Total Playtime</div>
          </div>
          <div class="ls-card">
            <div class="ls-val" style="color:var(--green)">6</div>
            <div class="ls-label">Downloaded</div>
          </div>
          <div class="ls-card">
            <div class="ls-val" style="color:#a78bfa">18</div>
            <div class="ls-label">Cloud Only</div>
          </div>
        </div>

        <!-- CONTROLS -->
        <div class="lib-controls">
          <div class="lib-search">
            <span class="lib-search-icon">🔍</span>
            <input placeholder="Search your library…" id="q" oninput="doSearch(this.value)">
          </div>
          <div class="fpill on" onclick="setFilter('all',this)">All</div>
          <div class="fpill" onclick="setFilter('local',this)">📥 Downloaded</div>
          <div class="fpill" onclick="setFilter('cloud',this)">☁️ Cloud Only</div>
          <div class="fpill" onclick="setFilter('recent',this)">🕐 Recently Played</div>
          <div class="view-btns">
            <div class="view-btn on" id="vg" onclick="setView('grid')" title="Grid">⊞</div>
            <div class="view-btn" id="vl" onclick="setView('list')" title="List">≡</div>
          </div>
        </div>

        <!-- LIBRARY GRID -->
        <div id="lib-container"></div>
      </div>
    </div>
  </div>
  <div class="toasts" id="toasts"></div>

  <script src="api.js"></script>
  <script>
    let GAMES = [];
    let viewMode = 'grid';
    let cur = 'all';

    function gridCard(g) { return `<div class="lg-card"><div class="lg-thumb" onclick="location.href='page2_game_detail.html?id=${g.game_id}'" style="cursor:pointer"><span style="position:relative;z-index:1">${g.emoji}</span><div class="lg-overlay"></div></div><div class="lg-body"><div class="lg-genre">${g.genre}</div><div class="lg-title"><a href="page2_game_detail.html?id=${g.game_id}" style="color:inherit;text-decoration:none;">${g.title}</a></div><div class="lg-footer"><span class="lg-hours">${g.hours}h played</span><span class="cloud-badge"><div class="cloud-dot ${g.local ? 'local' : 'cloud'}"></div>${g.local ? 'Local' : 'Cloud'}</span></div><div class="lg-actions"><button class="btn btn-primary" onclick="play('${g.title}')">▶ Play</button><button class="btn btn-ghost" onclick="toggleLocal(${g.game_id})" title="${g.local ? 'Delete local files' : 'Download'}">${g.local ? '🗑 Delete' : '⬇ Install'}</button></div></div></div>` }

    function listRow(g) { return `<div class="ll-row"><div class="ll-thumb">${g.emoji}</div><div class="ll-info"><div class="ll-title"><a href="page2_game_detail.html?id=${g.game_id}" style="color:inherit;text-decoration:none;">${g.title}</a></div><div class="ll-dev">by ${g.dev}</div><div class="ll-meta"><span class="ll-tag">${g.genre}</span><span class="ll-hours">${g.hours}h played</span><span style="font-size:11px;color:var(--muted)">Last: ${g.lastPlayed}</span></div></div><div class="ll-right"><span class="cloud-badge"><div class="cloud-dot ${g.local ? 'local' : 'cloud'}"></div><span style="font-size:11px;color:var(--muted2)">${g.local ? 'Downloaded' : 'Cloud'}</span></span><div class="ll-actions"><button class="btn btn-primary btn-sm" onclick="play('${g.title}')">▶ Play</button><button class="btn btn-ghost btn-sm" onclick="toggleLocal(${g.game_id})">${g.local ? '🗑' : '⬇'}</button></div></div></div>` }

    function updateStats() {
      const owned = GAMES.length;
      const hours = GAMES.reduce((sum, g) => sum + g.hours, 0);
      const local = GAMES.filter(g => g.local).length;
      const cloud = GAMES.length - local;
      
      const statsHtml = `
      <div class="lib-stats">
        <div class="ls-card"><div class="ls-val" style="color:var(--accent)">${owned}</div><div class="ls-label">Games Owned</div></div>
        <div class="ls-card"><div class="ls-val" style="color:var(--gold)">${hours}h</div><div class="ls-label">Total Playtime</div></div>
        <div class="ls-card"><div class="ls-val" style="color:var(--green)">${local}</div><div class="ls-label">Downloaded</div></div>
        <div class="ls-card"><div class="ls-val" style="color:#a78bfa">${cloud}</div><div class="ls-label">Cloud Only</div></div>
      </div>`;
      
      const libControls = document.querySelector('.lib-controls');
      const existingStats = document.querySelector('.lib-stats');
      if (existingStats) {
        existingStats.outerHTML = statsHtml;
      }
    }

    function render(list) {
      const c = document.getElementById('lib-container');
      if (list.length === 0) {
         c.innerHTML = `<div style="text-align:center;padding:40px;color:var(--muted)"><div style="font-size:48px;margin-bottom:12px">📭</div><h3>No games found</h3></div>`;
         return;
      }
      if (viewMode === 'grid') { c.className = 'lib-grid'; c.innerHTML = list.map(gridCard).join('') }
      else { c.className = 'lib-list'; c.innerHTML = list.map(listRow).join('') }
    }
    
    function getFiltered() {
      if (cur === 'local') return GAMES.filter(g => g.local);
      if (cur === 'cloud') return GAMES.filter(g => !g.local);
      if (cur === 'recent') return GAMES.filter(g => g.lastPlayed === 'Today' || g.lastPlayed === 'Yesterday');
      return GAMES;
    }
    
    function setFilter(f, el) { cur = f; document.querySelectorAll('.fpill').forEach(p => p.classList.remove('on')); el.classList.add('on'); render(getFiltered()) }
    function setView(v) { viewMode = v; document.getElementById('vg').classList.toggle('on', v === 'grid'); document.getElementById('vl').classList.toggle('on', v === 'list'); render(getFiltered()) }
    function doSearch(q) { const l = q ? GAMES.filter(g => g.title.toLowerCase().includes(q.toLowerCase()) || g.genre.toLowerCase().includes(q.toLowerCase())) : getFiltered(); render(l) }
    function play(title) { showToast(`Launching ${title}… 🚀`, 's') }
    function toggleLocal(gameId) { 
      const g = GAMES.find(x => x.game_id === gameId); 
      if (!g) return;

      if (!g.local) {
        // Installing
        showToast(`Downloading ${g.title}… 💾`, 'i');
        Library.downloadGame(g.game_id).then(success => {
          if (success) {
            g.local = true;
            localStorage.setItem(`installed_${g.game_id}`, 'true');
            showToast(`${g.title} download complete! ✅`, 's');
            updateStats();
            render(getFiltered());
          }
        });
      } else {
        // Deleting
        g.local = false;
        localStorage.removeItem(`installed_${g.game_id}`);
        showToast(`${g.title} files deleted — cloud save preserved ☁️`, 'i'); 
        updateStats();
        render(getFiltered());
      }
    }

    async function initPage() {
      if (!Auth.isAuthenticated()) {
        const c = document.getElementById('lib-container');
        c.innerHTML = `<div style="text-align:center;padding:60px 20px"><div style="font-size:40px;margin-bottom:14px">🔒</div><div style="font-size:22px;font-family:var(--fw);font-weight:700;margin-bottom:8px">Login Required</div><div style="color:var(--muted);margin-bottom:20px;font-size:14px">Please log in to view your library</div><a href="page1_store.html" class="btn btn-primary">Go to Login →</a></div>`;
        return;
      }
      try {
        const data = await apiFetch('/purchases');
        if (!data) return;
        
        GAMES = data.map(p => ({
          id: p.id,
          game_id: p.game_id,
          title: p.title,
          emoji: '🎮', // In real app, games table would have emoji
          genre: p.genre || 'Action',
          dev: 'Developer',
          hours: Math.floor(Math.random() * 50),
          local: localStorage.getItem(`installed_${p.game_id}`) === 'true',
          lastPlayed: 'Recently'
        }));
        updateStats();
        render(GAMES);
      } catch (err) {
        showToast('Failed to load library', 'e');
      }
    }

    document.addEventListener('DOMContentLoaded', initPage);
  </script>
</body>

</html>
